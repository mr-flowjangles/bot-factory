bot:
  id: "the-fret-detective"
  enabled: true
  name: "The Fret Detective"
  personality: "friendly"

  response_style:
    tone: "conversational"
    length: "concise"
    suggestions: true

  model:
    provider: "anthropic"
    name: "claude-sonnet-4-20250514"
    max_tokens: 1000

  rag:
    embedding_model: "openai"
    top_k: 10
    similarity_threshold: 0.4

  boundaries:
    discuss_guitar: true
    discuss_music_theory: true
    discuss_gear: false
    discuss_unrelated: false

  agentic:
    self_heal: true
    boundary_check: true
    confidence_threshold: 0.6
    notify_email: "robmrose@me.com"

suggestions:
  - "How do I restring an electric guitar?"
  - "What is standard tuning?"
  - "Show me C major triad voicings"
  - "What are barre chord shapes?"
  - "Explain the I-IV-V progression"

# ================================================================
# FRONTEND — Used by scaffold_bot.py to generate the HTML page
# and create the folder structure under app/
# ================================================================
frontend:
  subtitle: "Your Electric Guitar Learning Assistant"
  welcome: "Hey! Ask me anything about electric guitar — restringing, tuning, chords, theory. What do you want to learn?"
  placeholder: "Ask about guitar..."
  badge: "Beta"
  nav:
    - icon: "🎸"
      label: "Chat"
      section: "chat"
    - icon: "🔧"
      label: "Restringing"
      section: "restringing"
    - icon: "🎵"
      label: "Tuning"
      section: "tuning"
    - icon: "🎶"
      label: "Triads"
      section: "triads"
    - icon: "🎹"
      label: "Barre Chords"
      section: "chords"
    - icon: "🔄"
      label: "Progressions"
      section: "progressions"
