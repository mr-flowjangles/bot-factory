<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot Factory — Test Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface-raised: #222;
    --border: #2a2a2a;
    --text: #e8e4df;
    --text-muted: #7a756e;
    --accent: #6b8afd;
    --accent-dim: #5070d0;
    --user-bg: #1a2236;
    --bot-bg: #1a1a1a;
    --sans: 'DM Sans', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    overflow: hidden;
  }

  body { display: flex; flex-direction: column; }

  /* ---- Header ---- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    gap: 12px;
    flex-wrap: wrap;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .brand h1 {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.02em;
  }

  .test-badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    background: #2a1a1a;
    color: #d4a0a0;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .config-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .config-bar label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .config-bar input {
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .config-bar input:focus { border-color: var(--accent-dim); }

  #apiInput { width: 340px; }
  #botInput { width: 100px; }

  .status-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #5a3a3a;
    transition: background 0.3s;
    flex-shrink: 0;
  }

  .status-dot.ok { background: #4a7a4a; }

  .timing {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    min-width: 40px;
    text-align: right;
  }

  /* ---- Chat Area ---- */
  #chatArea {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .msg {
    max-width: 720px;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .msg.user {
    align-self: flex-end;
    background: var(--user-bg);
    border: 1px solid #2a3450;
    color: #c4d0e8;
    border-bottom-right-radius: 4px;
  }

  .msg.bot {
    align-self: flex-start;
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .msg.error {
    border-color: #4a2a2a;
    color: #d4a0a0;
  }

  /* ---- Typing indicator ---- */
  .typing-indicator {
    align-self: flex-start;
    display: flex;
    gap: 5px;
    padding: 14px 18px;
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    border-bottom-left-radius: 4px;
  }

  .typing-indicator span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ---- Input ---- */
  #inputArea {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }

  #msgInput {
    flex: 1;
    font-family: var(--sans);
    font-size: 15px;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    resize: none;
    min-height: 46px;
    max-height: 140px;
  }

  #msgInput:focus { border-color: var(--accent-dim); }
  #msgInput::placeholder { color: var(--text-muted); }

  #sendBtn {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    padding: 0 20px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #0f0f0f;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: opacity 0.15s;
  }

  #sendBtn:hover { opacity: 0.85; }
  #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ---- Scrollbar ---- */
  #chatArea::-webkit-scrollbar { width: 6px; }
  #chatArea::-webkit-scrollbar-track { background: transparent; }
  #chatArea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ---- Responsive ---- */
  @media (max-width: 700px) {
    header { padding: 10px 14px; }
    .brand h1 { font-size: 13px; }
    #apiInput { width: 200px; }
    #chatArea { padding: 16px; }
    #inputArea { padding: 12px 16px; }
    .msg { font-size: 14px; padding: 12px 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Bot Factory</h1>
    <span class="test-badge">Test</span>
  </div>
  <div class="config-bar">
    <label>API</label>
    <input id="apiInput" type="text" spellcheck="false">
    <label>Bot</label>
    <input id="botInput" type="text" spellcheck="false">
    <div class="status-group">
      <div class="status-dot" id="statusDot" title="API status"></div>
      <span class="timing" id="lastTiming"></span>
    </div>
  </div>
</header>

<div id="chatArea">
  <div class="msg bot">Ready. Type a message to test your bot.</div>
</div>

<div id="inputArea">
  <textarea id="msgInput" placeholder="Ask something..." rows="1"></textarea>
  <button id="sendBtn">Send</button>
</div>

<script>
  // ─── Read config from URL params, fall back to defaults ───
  const params  = new URLSearchParams(window.location.search);
  const API_URL = params.get('api') || 'https://4bu5vwwizdql4wzwh6dqhke62m0oyrbk.lambda-url.us-east-1.on.aws';
  const BOT_ID  = params.get('bot') || 'guitar';

  // ─── DOM ──────────────────────────────────────────
  const chatArea   = document.getElementById('chatArea');
  const msgInput   = document.getElementById('msgInput');
  const sendBtn    = document.getElementById('sendBtn');
  const apiInput   = document.getElementById('apiInput');
  const botInput   = document.getElementById('botInput');
  const statusDot  = document.getElementById('statusDot');
  const lastTiming = document.getElementById('lastTiming');

  // Populate inputs from config
  apiInput.value = API_URL;
  botInput.value = BOT_ID;

  // ─── Auto-resize textarea ────────────────────────
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 140) + 'px';
  });

  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  sendBtn.addEventListener('click', send);

  // Re-check health when API URL changes
  apiInput.addEventListener('change', checkHealth);

  // ─── Health check ────────────────────────────────
  checkHealth();

  async function checkHealth() {
    try {
      const base = apiInput.value.replace(/\/+$/, '');
      const res = await fetch(base + '/health');
      const data = await res.json();
      statusDot.classList.toggle('ok', data.status === 'ok');
    } catch {
      statusDot.classList.remove('ok');
    }
  }

  // ─── Helpers ─────────────────────────────────────
  function addMsg(text, role) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.textContent = text;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing-indicator';
    div.id = 'typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  // ─── Send + Stream ──────────────────────────────
  async function send() {
    const text = msgInput.value.trim();
    if (!text) return;

    const base  = apiInput.value.replace(/\/+$/, '');
    const botId = botInput.value.trim();

    addMsg(text, 'user');
    msgInput.value = '';
    msgInput.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();

    const t0 = performance.now();

    try {
      const res = await fetch(base + '/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bot_id: botId, message: text })
      });

      if (!res.ok) {
        hideTyping();
        addMsg(`Error: ${res.status} ${res.statusText}`, 'bot').classList.add('error');
        sendBtn.disabled = false;
        msgInput.focus();
        return;
      }

      hideTyping();
      const botDiv = addMsg('', 'bot');
      let fullText = '';
      let buffer = '';

      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6).trim();
          if (payload === '[DONE]') continue;

          try {
            const parsed = JSON.parse(payload);
            if (parsed.error) {
              botDiv.textContent = `Error: ${parsed.error}`;
              botDiv.classList.add('error');
              break;
            }
            if (parsed.token) {
              fullText += parsed.token;
              botDiv.textContent = fullText;
              chatArea.scrollTop = chatArea.scrollHeight;
            }
          } catch { /* malformed line, skip */ }
        }
      }

      const elapsed = ((performance.now() - t0) / 1000).toFixed(2);
      lastTiming.textContent = `${elapsed}s`;
      statusDot.classList.add('ok');

    } catch (err) {
      hideTyping();
      addMsg(`Connection error: ${err.message}`, 'bot').classList.add('error');
      statusDot.classList.remove('ok');
      lastTiming.textContent = '';
    }

    sendBtn.disabled = false;
    msgInput.focus();
  }
</script>

</body>
</html>
