<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Fret Detective — Chat Test</title>
<style>
  :root {
    --bg: #0e0e10;
    --surface: #18181b;
    --border: #2a2a2e;
    --text: #e4e4e7;
    --text-muted: #71717a;
    --accent: #22d3ee;
    --user-bg: #1c2a35;
    --bot-bg: #1a1a1f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
  }
  header .badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(34, 211, 238, 0.15);
    color: var(--accent);
    border: 1px solid rgba(34, 211, 238, 0.25);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .status {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-muted);
  }
  .status .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ef4444;
    margin-right: 6px;
    vertical-align: middle;
  }
  .status .dot.ok { background: #22c55e; }

  #chatArea {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg {
    max-width: 720px;
    width: fit-content;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user {
    background: var(--user-bg);
    align-self: flex-end;
    border-bottom-right-radius: 4px;
    border: 1px solid rgba(34, 211, 238, 0.15);
  }
  .msg.bot {
    background: var(--bot-bg);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    border: 1px solid var(--border);
  }
  .typing { display: flex; gap: 5px; padding: 14px 18px; align-self: flex-start; }
  .typing span {
    width: 7px; height: 7px; background: var(--text-muted);
    border-radius: 50%; animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  #inputArea {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 10px;
  }
  #msgInput {
    flex: 1;
    font-size: 15px;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    outline: none;
    resize: none;
    min-height: 46px;
    max-height: 140px;
    font-family: inherit;
  }
  #msgInput:focus { border-color: var(--accent); }
  #msgInput::placeholder { color: var(--text-muted); }
  #sendBtn {
    font-size: 13px;
    font-weight: 600;
    padding: 0 20px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: var(--bg);
    cursor: pointer;
  }
  #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <h1>The Fret Detective</h1>
  <span class="badge">test</span>
  <div class="status">
    <span class="dot" id="dot"></span>
    <span id="statusText">checking...</span>
  </div>
</header>

<div id="chatArea">
  <div class="msg bot">Hey! Ask me anything about electric guitar.</div>
</div>

<div id="inputArea">
  <textarea id="msgInput" placeholder="Ask about guitar..." rows="1"></textarea>
  <button id="sendBtn">Send</button>
</div>

<script>
  const API_URL = 'https://4bu5vwwizdql4wzwh6dqhke62m0oyrbk.lambda-url.us-east-1.on.aws';
  const BOT_ID = 'the-fret-detective';
  const API_KEY = 'bfk_dmg-Cbus-BHQV9VjyFBEtprxmXrCpqHqF83uRyhGLO4';

  const chatArea = document.getElementById('chatArea');
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  const dot = document.getElementById('dot');
  const statusText = document.getElementById('statusText');

  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 140) + 'px';
  });
  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener('click', send);

  // Health check
  fetch(API_URL + '/health')
    .then(r => r.json())
    .then(d => {
      if (d.status === 'ok') { dot.classList.add('ok'); statusText.textContent = 'connected'; }
      else { statusText.textContent = 'error'; }
    })
    .catch(() => { statusText.textContent = 'offline'; });

  async function send() {
    const text = msgInput.value.trim();
    if (!text) return;

    const userDiv = document.createElement('div');
    userDiv.className = 'msg user';
    userDiv.textContent = text;
    chatArea.appendChild(userDiv);

    msgInput.value = '';
    msgInput.style.height = 'auto';
    sendBtn.disabled = true;

    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerHTML = '<span></span><span></span><span></span>';
    chatArea.appendChild(typing);
    chatArea.scrollTop = chatArea.scrollHeight;

    try {
      const res = await fetch(API_URL + '/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
        body: JSON.stringify({ bot_id: BOT_ID, message: text })
      });

      typing.remove();

      if (!res.ok) {
        const errDiv = document.createElement('div');
        errDiv.className = 'msg bot';
        errDiv.textContent = 'Error: ' + res.status + ' ' + res.statusText;
        chatArea.appendChild(errDiv);
        sendBtn.disabled = false;
        return;
      }

      const botDiv = document.createElement('div');
      botDiv.className = 'msg bot';
      chatArea.appendChild(botDiv);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let fullText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6).trim();
          if (payload === '[DONE]') continue;
          try {
            const data = JSON.parse(payload);
            if (data.error) fullText += 'Error: ' + data.error;
            else if (data.token) fullText += data.token;
            botDiv.textContent = fullText;
            chatArea.scrollTop = chatArea.scrollHeight;
          } catch {}
        }
      }
    } catch (err) {
      typing.remove();
      const errDiv = document.createElement('div');
      errDiv.className = 'msg bot';
      errDiv.textContent = 'Connection error: ' + err.message;
      chatArea.appendChild(errDiv);
    }

    sendBtn.disabled = false;
    msgInput.focus();
  }
</script>
</body>
</html>
