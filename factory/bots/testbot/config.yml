bot:
  id: "testbot"
  enabled: false
  name: "<bot_name>"
  personality: "<bot_personality>"

  response_style:
    tone: "<response_tone>"
    length: "<response_length>"
    suggestions: true

  model:
    provider: "anthropic"
    name: "claude-sonnet-4-20250514"
    max_tokens: 1024

  rag:
    embedding_model: "text-embedding-3-small"
    top_k: 5
    similarity_threshold: 0.3

  boundaries:
    discuss_unrelated: false

suggestions:
  - "<suggestion_1>"
  - "<suggestion_2>"
  - "<suggestion_3>"

frontend:
  subtitle: "<subtitle>"
  welcome: "<welcome_message>"
  placeholder: "Type a message..."
  badge: "Beta"
  nav:
    - icon: "💬"
      label: "Chat"
      section: "chat"
    - icon: "ℹ️"
      label: "About"
      section: "about"
