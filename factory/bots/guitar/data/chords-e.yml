  items:
  - name: Em7 (E minor 7th) open chord
    frets: 0-2-0-0-0-0
    notes: E, B, D, G, B, E
    tip: Easiest 7th chord. Just one finger. Middle finger on A string 2nd fret, everything else open.
    tab: 'e|---0---|

      B|---0---|

      G|---0---|

      D|---0---|

      A|---2---|

      E|---0---|'
- id: chord_esus4
  format: object
  category: Chords
  heading: Esus4 Chord
  search_terms: Esus4 chord, E suspended 4, E sus 4, how to play Esus4
  template: '{name}. Frets (EADGBE): {frets}. Notes: {notes}. {tip}


    Tab:

    {tab}'
  items:
  - name: Esus4 (E suspended 4th) open chord
    frets: 0-2-2-2-0-0
    notes: E, B, E, A, B, E
    tip: Like E major but add your ring finger on G string 2nd fret. The A replaces the G# (3rd) with A (4th). Resolves beautifully
      to E major.
    tab: 'e|---0---|

      B|---0---|

      G|---2---|

      D|---2---|

      A|---2---|

      E|---0---|'
