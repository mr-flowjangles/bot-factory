- id: chord_e_major
  format: object
  category: Chords
  heading: E Major Open Chord
  search_terms: E chord, E major, E major chord, how to play E
  template: '{name}. Frets (EADGBE): {frets}. Notes: {notes}. {tip}


    Tab:

    {tab}'
  items:
  - name: E Major open chord
    frets: 0-2-2-1-0-0
    notes: E, B, E, G#, B, E
    tip: All six strings ring out. Middle finger on A string 2nd fret, ring finger on D string 2nd fret, index on G string
      1st fret.
    tab: 'e|---0---|

      B|---0---|

      G|---1---|

      D|---2---|

      A|---2---|

      E|---0---|'
- id: chord_e_minor
  format: object
  category: Chords
  heading: E Minor Open Chord
  search_terms: Em chord, E minor, E minor chord, how to play Em
  template: '{name}. Frets (EADGBE): {frets}. Notes: {notes}. {tip}


    Tab:

    {tab}'
  items:
  - name: E minor (Em) open chord
    frets: 0-2-2-0-0-0
    notes: E, B, E, G, B, E
    tip: One of the easiest chords on guitar. Just two fingers. Middle on A string 2nd fret, ring on D string 2nd fret. All
      six strings ring out.
    tab: 'e|---0---|

      B|---0---|

      G|---0---|

      D|---2---|

      A|---2---|

      E|---0---|'
- id: chord_e7
  format: object
  category: Chords
  heading: E7 Chord
  search_terms: E7 chord, E dominant 7, E seven chord, how to play E7
  template: '{name}. Frets (EADGBE): {frets}. Notes: {notes}. {tip}


    Tab:

    {tab}'
  items:
  - name: E7 (E dominant 7th) open chord
    frets: 0-2-0-1-0-0
    notes: E, B, D, G#, B, E
    tip: Like E major but lift your ring finger off the D string. The open D gives you the flat 7th.
    tab: 'e|---0---|

      B|---0---|

      G|---1---|

      D|---0---|

      A|---2---|

      E|---0---|'
