  heading: Fmaj7 Chord
  search_terms: Fmaj7 chord, F major 7, F major seven chord, how to play Fmaj7, easy F chord
  template: '{name}. Frets (EADGBE): {frets}. Notes: {notes}. {tip}


    Tab:

    {tab}'
  items:
  - name: Fmaj7 (F major 7th) open chord
    frets: x-x-3-2-1-0
    notes: x, x, F, A, C, E
    tip: A beginner-friendly way to play an F chord without a barre. Ring finger on D string 3rd fret, middle on G string
      2nd fret, index on B string 1st fret.
    tab: 'e|---0---|

      B|---1---|

      G|---2---|

      D|---3---|

      A|---x---|

      E|---x---|'
- id: chord_f_major_barre
  format: object
  category: Chords
  heading: F Major Barre Chord
  search_terms: F chord, F major, F barre chord, how to play F, F major barre
  template: '{name}. Frets (EADGBE): {frets}. Notes: {notes}. {tip}


    Tab:

    {tab}'
  items:
  - name: F Major barre chord (full barre)
    frets: 1-3-3-2-1-1
    notes: F, C, F, A, C, F
    tip: Index finger barres all strings at 1st fret. Ring and pinky on A and D strings 3rd fret, middle on G string 2nd fret.
      This is the E-shape barre chord at the 1st fret. Hardest beginner chord and takes practice.
    tab: 'e|---1---|

      B|---1---|

      G|---2---|

      D|---3---|

      A|---3---|

      E|---1---|'
