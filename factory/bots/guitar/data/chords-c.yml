- id: chord_c_major
  format: object
  category: Chords
  heading: C Major Open Chord
  search_terms: C chord, C major, C major chord, how to play C
  template: '{name}. Frets (EADGBE): {frets}. Notes: {notes}. {tip}


    Tab:

    {tab}'
  items:
  - name: C Major open chord
    frets: x-3-2-0-1-0
    notes: x, C, E, G, C, E
    tip: Do not play the low E string. Ring finger on A string 3rd fret, middle finger on D string 2nd fret, index on B string
      1st fret.
    tab: 'e|---0---|

      B|---1---|

      G|---0---|

      D|---2---|

      A|---3---|

      E|---x---|'
- id: chord_c7
  format: object
  category: Chords
  heading: C7 Chord
  search_terms: C7 chord, C dominant 7, C seven chord, how to play C7
  template: '{name}. Frets (EADGBE): {frets}. Notes: {notes}. {tip}


    Tab:

    {tab}'
  items:
  - name: C7 (C dominant 7th) open chord
    frets: x-3-2-3-1-0
    notes: x, C, E, Bb, C, E
    tip: Like C major but add your pinky on G string 3rd fret for the Bb (flat 7th).
    tab: 'e|---0---|

      B|---1---|

      G|---3---|

      D|---2---|

      A|---3---|

      E|---x---|'
- id: chord_cmaj7
  format: object
  category: Chords
  heading: Cmaj7 Chord
  search_terms: Cmaj7 chord, C major 7, C major seven chord, how to play Cmaj7
  template: '{name}. Frets (EADGBE): {frets}. Notes: {notes}. {tip}


    Tab:

    {tab}'
  items:
  - name: Cmaj7 (C major 7th) open chord
    frets: x-3-2-0-0-0
    notes: x, C, E, G, B, E
    tip: Like C major but lift your index finger off the B string. The open B is the major 7th of C.
    tab: 'e|---0---|

      B|---0---|

      G|---0---|

      D|---2---|

      A|---3---|

      E|---x---|'
