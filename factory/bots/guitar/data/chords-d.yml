- id: chord_d_major
  format: object
  category: Chords
  heading: D Major Open Chord
  search_terms: D chord, D major, D major chord, how to play D
  template: '{name}. Frets (EADGBE): {frets}. Notes: {notes}. {tip}


    Tab:

    {tab}'
  items:
  - name: D Major open chord
    frets: x-x-0-2-3-2
    notes: x, x, D, A, D, F#
    tip: Only play the top four strings. Index on G string 2nd fret, ring finger on B string 3rd fret, middle finger on high
      E string 2nd fret.
    tab: 'e|---2---|

      B|---3---|

      G|---2---|

      D|---0---|

      A|---x---|

      E|---x---|'
