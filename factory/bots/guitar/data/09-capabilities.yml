entries:
  - id: capabilities_overview
    format: string
    category: General
    heading: What can the guitar bot help with
    search_terms: "what information do you have, what can you do, what can you show me, help, capabilities, features, what do you know, menu, options, what can you teach me"
    content: |
      Here's what I can help you with:

      GUITAR BASICS
      • Parts of the guitar (headstock, pickups, bridge, etc.)
      • String names and numbering (EADGBE)
      • How to hold the guitar and proper posture
      • Reading guitar tab notation
      • Understanding fret numbering

      CHORDS
      • Open chords (A, Am, C, D, Dm, E, Em, F, G and more)
      • Barre chord shapes (E-shape and A-shape)
      • Seventh chords (A7, Am7, D7, E7, etc.)
      • Sus2 and Sus4 chords
      • Power chords

      TRIADS (3-note chord voicings)
      • Major and minor triads for all 12 keys
      • Root position, 1st inversion, and 2nd inversion
      • Voicings on DGB and GBE string sets
      • Position clusters by fret (play all chords in a key without moving your hand)

      SCALES
      • Minor pentatonic scale
      • Major pentatonic scale
      • Blues scale

      TECHNIQUES
      • Strumming patterns
      • Palm muting
      • Hammer-ons and pull-offs
      • String bending
      • Alternate picking
      • Slides

      MUSIC THEORY
      • Key signatures and the circle of fifths
      • Chord formulas (how chords are built)
      • Common chord progressions (I-IV-V, ii-V-I, etc.)
      • The CAGED system

      GEAR & SETUP
      • String gauges explained
      • Pick thickness guide
      • Restringing your guitar
      • Tuning methods and reference pitches

      PRACTICE TIPS
      • How to structure your practice sessions
      • Building speed and accuracy

      Just ask me about any of these topics!
