- id: chord_b_major_barre
  format: string
  category: Chords
  heading: B Major Barre Chord
  search_terms: B chord, B major, B major chord, how to play B, B barre chord
  content: 'B Major barre chord (A-shape at 2nd fret): e|---2---| B|---4---| G|---4---| D|---4---| A|---2---| E|---x---| Bar
    your index finger across fret 2 on strings A through high E, then use your ring finger to bar the D, G, and B strings
    at fret 4. Do not play the low E string. This is the standard way to play B major on guitar since there is no easy open
    chord shape for B.'
- id: chord_b7
  format: object
  category: Chords
  heading: B7 Chord
  search_terms: B7 chord, B dominant 7, B seven chord, how to play B7
  template: '{name}. Frets (EADGBE): {frets}. Notes: {notes}. {tip}


    Tab:

    {tab}'
  items:
  - name: B7 (B dominant 7th) open chord
    frets: x-2-1-2-0-2
    notes: x, B, D#, A, B, F#
    tip: Do not play the low E string. Middle finger on A string 2nd fret, index on D string 1st fret, ring on G string 2nd
      fret, pinky on high E string 2nd fret.
    tab: 'e|---2---|

      B|---0---|

      G|---2---|

      D|---1---|

      A|---2---|

      E|---x---|'
