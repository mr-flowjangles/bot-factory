  heading: G7 Chord
  search_terms: G7 chord, G dominant 7, G seven chord, how to play G7
  template: '{name}. Frets (EADGBE): {frets}. Notes: {notes}. {tip}


    Tab:

    {tab}'
  items:
  - name: G7 (G dominant 7th) open chord
    frets: 3-2-0-0-0-1
    notes: G, B, D, G, B, F
    tip: Like G major but index finger on high E string 1st fret for the F (flat 7th) instead of pinky on 3rd fret.
    tab: 'e|---1---|

      B|---0---|

      G|---0---|

      D|---0---|

      A|---2---|

      E|---3---|'
- id: chord_gmaj7
  format: object
