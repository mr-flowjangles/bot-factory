    {tab}'
  items:
  - name: Gmaj7 (G major 7th) open chord
    frets: 3-2-0-0-0-2
    notes: G, B, D, G, B, F#
    tip: Like G major but middle finger on high E string 2nd fret instead of pinky on 3rd fret. The F# is the major 7th of
      G.
    tab: 'e|---2---|

      B|---0---|

      G|---0---|

      D|---0---|

      A|---2---|

      E|---3---|'
