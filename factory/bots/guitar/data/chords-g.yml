- id: chord_g_major
  format: object
  category: Chords
  heading: G Major Open Chord
  search_terms: G chord, G major, G major chord, how to play G
  template: '{name}. Frets (EADGBE): {frets}. Notes: {notes}. {tip}


    Tab:

    {tab}'
  items:
  - name: G Major open chord
    frets: 3-2-0-0-0-3
    notes: G, B, D, G, B, G
    tip: Middle finger on A string 2nd fret, index finger on low E string 3rd fret, pinky on high E string 3rd fret. All six
      strings ring out.
    tab: 'e|---3---|

      B|---0---|

      G|---0---|

      D|---0---|

      A|---2---|

      E|---3---|'
- id: chord_g7
  format: object
