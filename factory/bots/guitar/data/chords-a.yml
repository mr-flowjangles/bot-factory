- id: chord_a_major
  format: object
  category: Chords
  heading: A Major Open Chord
  search_terms: A chord, A major, A major chord, how to play A
  template: '{name}. Frets (EADGBE): {frets}. Notes: {notes}. {tip}


    Tab:

    {tab}'
  items:
  - name: A Major open chord
    frets: x-0-2-2-2-0
    notes: x, A, E, A, C#, E
    tip: Do not play the low E string. Index, middle, and ring fingers line up on the 2nd fret across D, G, and B strings.
    tab: 'e|---0---|

      B|---2---|

      G|---2---|

      D|---2---|

      A|---0---|

      E|---x---|'
- id: chord_a_minor
  format: object
  category: Chords
  heading: A Minor Open Chord
  search_terms: Am chord, A minor, A minor chord, how to play Am
  template: '{name}. Frets (EADGBE): {frets}. Notes: {notes}. {tip}


    Tab:

    {tab}'
  items:
  - name: A minor (Am) open chord
    frets: x-0-2-2-1-0
    notes: x, A, E, A, C, E
    tip: Same shape as E major shifted down one string set. Do not play the low E string. Index on B string 1st fret, middle
      on D string 2nd fret, ring on G string 2nd fret.
    tab: 'e|---0---|

      B|---1---|

      G|---2---|

      D|---2---|

      A|---0---|

      E|---x---|'
- id: chord_a7
  format: object
  category: Chords
  heading: A7 Chord
  search_terms: A7 chord, A dominant 7, A seven chord, how to play A7
  template: '{name}. Frets (EADGBE): {frets}. Notes: {notes}. {tip}


    Tab:

    {tab}'
  items:
  - name: A7 (A dominant 7th) open chord
    frets: x-0-2-0-2-0
    notes: x, A, E, G, C#, E
    tip: Like A major but lift your middle finger off the G string. The open G gives you the flat 7th.
    tab: 'e|---0---|

      B|---2---|

      G|---0---|

      D|---2---|

      A|---0---|

      E|---x---|'
- id: chord_am7
  format: object
  category: Chords
