  search_terms: Am7 chord, A minor 7, A minor seven chord, how to play Am7
  template: '{name}. Frets (EADGBE): {frets}. Notes: {notes}. {tip}


    Tab:

    {tab}'
  items:
  - name: Am7 (A minor 7th) open chord
    frets: x-0-2-0-1-0
    notes: x, A, E, G, C, E
    tip: Like Am but lift your ring finger off the G string. The open G gives you the minor 7th.
    tab: 'e|---0---|

      B|---1---|

      G|---0---|

      D|---2---|

      A|---0---|

      E|---x---|'
- id: chord_asus2
  format: object
  category: Chords
  heading: Asus2 Chord
  search_terms: Asus2 chord, A suspended 2, A sus 2, how to play Asus2
  template: '{name}. Frets (EADGBE): {frets}. Notes: {notes}. {tip}


    Tab:

    {tab}'
  items:
  - name: Asus2 (A suspended 2nd) open chord
    frets: x-0-2-2-0-0
    notes: x, A, E, A, B, E
    tip: Like A major but lift your index finger off the B string. The open B replaces the C# (3rd) with B (2nd), creating
      an open dreamy sound.
    tab: 'e|---0---|

      B|---0---|

      G|---2---|

      D|---2---|

      A|---0---|

      E|---x---|'
- id: chord_asus4
  format: object
  category: Chords
  heading: Asus4 Chord
  search_terms: Asus4 chord, A suspended 4, A sus 4, how to play Asus4
  template: '{name}. Frets (EADGBE): {frets}. Notes: {notes}. {tip}


    Tab:

    {tab}'
  items:
  - name: Asus4 (A suspended 4th) open chord
    frets: x-0-2-2-3-0
    notes: x, A, E, A, D, E
    tip: Like A major but add your pinky on B string 3rd fret. The D replaces the C# (3rd) with D (4th). Wants to resolve
      back to A major.
    tab: 'e|---0---|

      B|---3---|

      G|---2---|

      D|---2---|

      A|---0---|

      E|---x---|'
