    IV: Db
    V: Eb
    capo_tip: Capo 4, play E shapes. Or capo 1, play G shapes.
  - key: Db
    I: Db
    IV: Gb
    V: Ab
    capo_tip: Capo 4, play A shapes. Or capo 1, play C shapes.
  - key: Eb
    I: Eb
    IV: Ab
    V: Bb
    capo_tip: Capo 3, play C shapes. Or capo 1, play D shapes.
  - key: Gb
    I: Gb
    IV: Cb
    V: Db
    capo_tip: Capo 2, play E shapes.
