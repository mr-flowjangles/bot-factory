- id: major_key_player_chart
  format: object
  category: Theory
  heading: Major key chord chart with I-IV-V and capo positions
  search_terms: key chart, I IV V, capo chart, what key, chord progression key
  template: 'Key of {key}: I={I}, IV={IV}, V={V}. {capo_tip}'
  items:
  - key: C
    I: C
    IV: F
    V: G
    capo_tip: No capo needed. Use open C, F, G shapes.
  - key: D
    I: D
    IV: G
    V: A
    capo_tip: No capo needed. Use open D, G, A shapes.
  - key: E
    I: E
    IV: A
    V: B
    capo_tip: No capo needed. Use open E, A shapes. B needs a barre.
  - key: F
    I: F
    IV: Bb
    V: C
    capo_tip: Capo 1, play E shapes. Or capo 3, play D shapes.
  - key: G
    I: G
    IV: C
    V: D
    capo_tip: No capo needed. Use open G, C, D shapes.
  - key: A
    I: A
    IV: D
    V: E
    capo_tip: No capo needed. Or capo 2, play G shapes.
  - key: Bb
    I: Bb
    IV: Eb
    V: F
    capo_tip: Capo 3, play G shapes. Or capo 1, play A shapes.
  - key: B
    I: B
    IV: E
    V: F#
    capo_tip: Capo 4, play G shapes. Or capo 2, play A shapes.
  - key: Ab
