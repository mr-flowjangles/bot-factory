services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: bot-factory
    env_file:
      - .env
    ports:
      - "8080:80"
    volumes:
      - ./app:/usr/share/nginx/html:ro
    networks:
      - net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3

  localstack:
    image: localstack/localstack:latest
    environment:
      - SERVICES=dynamodb,s3
      - DEBUG=0
      - LS_LOG=warn
      - DATA_DIR=/var/lib/localstack
      - DOCKER_HOST=unix:///var/run/docker.sock
      - PERSISTENCE=1
    ports:
      - "4566:4566"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./localstack-data:/var/lib/localstack"
    networks:
      - net

  init-dynamodb:
    image: amazon/aws-cli
    depends_on:
      - localstack
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - ./scripts:/scripts
    networks:
      - net
    entrypoint: ["/scripts/init-dynamodb.sh"]

  init-s3:
    image: amazon/aws-cli
    depends_on:
      - localstack
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    networks:
      - net
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Waiting for LocalStack S3..."
        until aws --endpoint-url=http://localstack:4566 s3 ls 2>/dev/null; do
          sleep 2
        done
        echo "Creating bot-factory-data bucket..."
        aws --endpoint-url=http://localstack:4566 s3 mb s3://bot-factory-data 2>/dev/null || true
        echo "S3 bucket ready."

networks:
  net:
    driver: bridge
